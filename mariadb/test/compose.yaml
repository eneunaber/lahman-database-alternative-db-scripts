services:
  mariadb:
    image: mariadb:11
    container_name: mariadb_test
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: lahman
      MARIADB_USER: testuser
      MARIADB_PASSWORD: testpass
      MARIADB_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    command: ["mariadbd", "--local-infile=1"]
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER -p$$MARIADB_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  adminer:
    image: adminer:latest
    container_name: adminer_test
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8010:8080"

volumes:
  mariadb_data:
